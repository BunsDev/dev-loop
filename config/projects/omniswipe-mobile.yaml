# Project-specific configuration for omniswipe-mobile
# React Native 0.84 CLI app (Android)

quality_gates:
  sanity:
    enabled: true
    commands: ["npx tsc --noEmit"]
  relevance:
    enabled: true
  secrets:
    enabled: true
  dangerous_ops:
    enabled: true
  security:
    enabled: false  # React Native — bandit is Python-only
  review:
    enabled: true
    block_on: critical
  cost:
    enabled: true
    ceiling_usd: 5.00

tools:
  type_checker: "npx tsc --noEmit"
  linter: "npx eslint"
  formatter: "npx prettier --write"
  package_manager: npm
  e2e_runner: "maestro test"
