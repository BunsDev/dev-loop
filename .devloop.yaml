ambient: true

deny_list:
  # Source code files that match *secret* pattern — not actual secrets
  remove_patterns: ["*secret*"]
  extra_patterns: []
  # Allow .env.example files (documentation templates, not real secrets)
  allow_patterns: [".env.example*"]

dangerous_ops:
  allow_patterns:
    - "rm -rf target"
    - "rm -rf node_modules"

secrets:
  file_allowlist:
    - "daemon/src/check/secrets.rs"
